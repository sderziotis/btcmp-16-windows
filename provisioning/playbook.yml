- name: Configure wavm
  hosts: wavm
  gather_facts: false
  pre_tasks:
    - name: Wait for PSRP listener to accept connections
      ansible.builtin.wait_for_connection:
        delay: 0
        sleep: 10
        timeout: 900
  roles:
    - role: ansible-role-user-access-windows
      user_access_username: LocalAdmin
      user_access_password: Password123!
      user_access_rdp: True
      user_access_admin: True
  tasks:
    - name: Install Git, FTK Imager, Autopsy, and Strawberry Perl via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name:
          - git
          - autopsy
          - strawberryperl
        state: present

    - name: Download FTK Imager
      ansible.windows.win_get_url:
        url: https://d1kpmuwb7gvu1i.cloudfront.net/FTK_Imager_4.7.1.2.zip
        dest: C:\Windows\Temp\FTKImager.zip

    - name: Ensure FTK Imager destination exists
      ansible.windows.win_file:
        path: C:\Tools\FTKImager
        state: directory

    - name: Extract FTK Imager
      community.windows.win_unzip:
        src: C:\Windows\Temp\FTKImager.zip
        dest: C:\Tools\FTKImager

    - name: Remove FTK Imager ZIP
      ansible.windows.win_file:
        path: C:\Windows\Temp\FTKImager.zip
        state: absent

