    base_box:
      image: windows-server-2019-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm
    hidden: false
  - name: srv02
    flavor: c2_r4_d40
    base_box:
      image: windows-server-2019-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm
    hidden: false
