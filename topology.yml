# Main topology
name: btcmp-16
hosts:
  - name: wavm
    flavor: c4_r8_d80
    base_box:
      image: windows-11-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm
    hidden: false
  - name: wvvm
    flavor: c4_r8_d80
    base_box:
      image: windows-server-2025-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm
    hidden: false
routers:
  - name: router-1
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    hidden: false
networks:
  - name: network-2
    cidr: 192.168.10.0/24
    accessible_by_user: true
    hidden: false
wan:
  name: network-1
  cidr: 10.10.10.0/24
net_mappings:
  - host: wavm
    network: network-2
    ip: 192.168.10.10
  - host: wvvm
    network: network-2
    ip: 192.168.10.20
router_mappings:
  - router: router-1
    network: network-2
    ip: 192.168.10.1
groups: []
