# Main topology
name: btcmp-16
hosts:
  - name: wavm
    flavor: c4_r8_d60
    base_box:
      image: windows-server-2019-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm    # ← ADD THIS
    hidden: false
  - name: wvvm
    flavor: c4_r8_d60
    base_box:
      image: windows-server-2019-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm    # ← ADD THIS
    hidden: false
routers:
  - name: router
    flavor: standard.small
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    hidden: false
networks:
  - name: network-2
    cidr: 192.168.10.0/24
wan:
  name: network-1
  cidr: 10.10.10.0/24
net_mappings:
  - host: wavm
    network: network-2
    ip: 192.168.10.10
  - host: wvvm
    network: network-2
    ip: 192.168.10.20
router_mappings:
  - router: router
    network: network-2
    ip: 192.168.10.1
groups:
  - name: windows_hosts
    nodes:          # ← CHANGE hosts: to nodes:
      - wavm
      - wvvm