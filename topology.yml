name: btcmp16-windows-server-demo
hosts:
  - name: wavm
    flavor: c4_r8_d60
    base_box:
      image: windows-server-2019-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm
    hidden: false
  - name: wvvm
    flavor: c4_r8_d60
    base_box:
      image: windows-server-2019-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm
    hidden: false
    volumes:
      - size: 60
      - size: 5
routers:
  - name: router
    flavor: standard.small
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    hidden: false
networks:
  - name: network-1
    cidr: 192.168.10.0/24
    accessible_by_user: true
    hidden: false
wan:
  name: wan
  cidr: 10.10.10.0/24
net_mappings:
  - host: wavm
    network: network-1
    ip: 192.168.10.2
  - host: wvvm
    network: network-1
    ip: 192.168.10.3
router_mappings:
  - router: router
    network: network-1
    ip: 192.168.10.1
groups: []