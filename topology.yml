name: btcmp16-windows-srv
hosts:
  - name: wavm
    flavor: c4_r8_d60
    base_box:
      image: windows-server-2019-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm
    hidden: false
    volumes:
    - size: 60
    - size: 5
  - name: wvvm
    flavor: c4_r8_d60
    base_box:
      image: windows-server-2019-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm
    hidden: true
routers:
  - name: router
    flavor: standard.small
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    hidden: false
networks:
  - name: access-switch
    cidr: 10.10.10.0/24
    accessible_by_user: true
    hidden: false
wan:
  name: wan
  cidr: 10.10.100.0/24
net_mappings:
  - host: wavm
    network: access-switch
    ip: 10.10.10.3
  - host: wvvm
    network: access-switch
    ip: 10.10.10.4
router_mappings:
  - router: router
    network: access-switch
    ip: 10.10.10.1
groups: []